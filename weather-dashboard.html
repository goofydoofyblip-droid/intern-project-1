<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATMOSPHERICS — Live Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #080c14;
      --surface:    rgba(10, 20, 40, 0.82);
      --surface-2:  rgba(14, 26, 54, 0.6);
      --border:     rgba(0, 229, 255, 0.09);
      --border-h:   rgba(0, 229, 255, 0.22);
      --cyan:       #00e5ff;
      --teal:       #64ffda;
      --amber:      #ffb347;
      --violet:     #b388ff;
      --red:        #ff6b6b;
      --text:       #d8eeff;
      --text-2:     #5a82a8;
      --text-3:     #2c4560;
      --mono:       'JetBrains Mono', 'Courier New', monospace;
      --sans:       'Space Grotesk', system-ui, sans-serif;
      --r:          16px;
      --r-sm:       8px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background ─────────────────────────────── */
    .bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%,  rgba(0, 100, 220, 0.13) 0%, transparent 65%),
        radial-gradient(ellipse 50% 70% at 85%  55%,  rgba(0,  60, 140, 0.07) 0%, transparent 55%),
        radial-gradient(ellipse 45% 50% at 10%  70%,  rgba(0,  40, 100, 0.05) 0%, transparent 60%),
        #080c14;
    }
    /* Starfield */
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at  8% 15%, rgba(255,255,255,.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,.20) 0%, transparent 100%),
        radial-gradient(1px 1px at 42% 28%, rgba(255,255,255,.28) 0%, transparent 100%),
        radial-gradient(1px 1px at 58%  8%, rgba(255,255,255,.22) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 72%, rgba(255,255,255,.18) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 38%, rgba(255,255,255,.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,.20) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 50%, rgba(255,255,255,.12) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 82%, rgba(255,255,255,.18) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 92%, rgba(255,255,255,.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,.22) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 45%, rgba(255,255,255,.10) 0%, transparent 100%);
    }

    /* ── Container ──────────────────────────────── */
    .container {
      position: relative; z-index: 1;
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 20px 32px;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .18em;
      color: var(--cyan);
      text-shadow: 0 0 24px rgba(0,229,255,.4);
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan);
      animation: blink 2.2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── Search ─────────────────────────────────── */
    .search-wrap { display: flex; gap: 10px; flex: 1; max-width: 440px; }

    .search-input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 16px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      min-width: 0;
    }
    .search-input::placeholder { color: var(--text-3); }
    .search-input:focus {
      border-color: rgba(0,229,255,.35);
      box-shadow: 0 0 0 3px rgba(0,229,255,.07);
    }

    .search-btn {
      background: rgba(0,229,255,.1);
      border: 1px solid rgba(0,229,255,.28);
      border-radius: var(--r-sm);
      padding: 10px 22px;
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .search-btn:hover { background: rgba(0,229,255,.18); box-shadow: 0 0 18px rgba(0,229,255,.18); }
    .search-btn:active { transform: scale(.97); }
    .search-btn:disabled { opacity: .5; pointer-events: none; }

    /* ── Panel base ─────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 28px;
      transition: border-color .3s;
      animation: fadeUp .4s ease both;
    }
    .panel:hover { border-color: var(--border-h); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Section title (reusable) ───────────────── */
    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .2em;
      color: var(--text-3);
      margin-bottom: 22px;
    }

    /* ── Main grid ──────────────────────────────── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    /* ── Primary panel ──────────────────────────── */
    .primary-panel { position: relative; overflow: hidden; }

    /* SIGNATURE: radar rings */
    .radar-wrap {
      position: absolute;
      right: -40px; top: 50%; transform: translateY(-50%);
      width: 220px; height: 220px;
      pointer-events: none;
    }
    .ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(0,229,255,.07);
      animation: ring-out 3.6s ease-out infinite;
    }
    .ring:nth-child(1) { inset:30%; animation-delay:0s; }
    .ring:nth-child(2) { inset:15%; animation-delay:.9s; }
    .ring:nth-child(3) { inset: 0%; animation-delay:1.8s; }

    @keyframes ring-out {
      0%   { opacity:0; transform:scale(.55); }
      25%  { opacity:1; }
      100% { opacity:0; transform:scale(1.05); }
    }

    .location-row { margin-bottom: 18px; }

    .city-name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.2;
    }

    .country-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      background: rgba(0,229,255,.1);
      color: var(--cyan);
      padding: 2px 9px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
      letter-spacing: .06em;
    }

    .datetime {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-2);
      margin-top: 5px;
      letter-spacing: .05em;
    }

    /* Temperature */
    .temp-row {
      display: flex;
      align-items: flex-start;
      gap: 3px;
      margin: 10px 0 6px;
      line-height: 1;
    }

    .temp-num {
      font-family: var(--mono);
      font-size: 76px;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 40px rgba(0,229,255,.4);
      transition: color .5s, text-shadow .5s;
      animation: temp-arrive .4s ease;
    }
    @keyframes temp-arrive {
      from { opacity:0; transform:translateY(6px) scale(.97); }
      to   { opacity:1; transform:none; }
    }

    .temp-deg {
      font-family: var(--mono);
      font-size: 30px;
      font-weight: 300;
      color: var(--text-2);
      padding-top: 12px;
    }

    .condition-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 6px;
    }
    .cond-icon { font-size: 22px; }
    .cond-text { font-size: 14px; color: var(--text-2); font-weight: 500; }

    .feels-row {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: .04em;
    }
    .feels-row span { color: var(--amber); }

    /* Temperature color themes */
    .t-cold { color: #81d4fa !important; text-shadow: 0 0 40px rgba(129,212,250,.4) !important; }
    .t-cool { color: var(--teal) !important; text-shadow: 0 0 40px rgba(100,255,218,.4) !important; }
    .t-mild { color: var(--cyan) !important; text-shadow: 0 0 40px rgba(0,229,255,.4) !important; }
    .t-warm { color: var(--amber) !important; text-shadow: 0 0 40px rgba(255,179,71,.4) !important; }
    .t-hot  { color: var(--red)   !important; text-shadow: 0 0 40px rgba(255,107,107,.4) !important; }

    /* ── Metrics panel ──────────────────────────── */
    .metric-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .metric-item:last-child { border-bottom: none; padding-bottom: 0; }
    .metric-item:first-child { padding-top: 0; }

    .metric-icon-box {
      width: 36px; height: 36px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      border: 1px solid rgba(100,255,218,.12);
      background: rgba(100,255,218,.06);
    }

    .metric-body { flex: 1; min-width: 0; }

    .metric-lbl {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .2em;
      color: var(--text-3);
      margin-bottom: 2px;
    }

    .metric-val {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
      color: var(--teal);
    }

    .bar-track {
      height: 3px;
      background: rgba(100,255,218,.08);
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--teal), var(--cyan));
      border-radius: 2px;
      transition: width .9s cubic-bezier(.25,.46,.45,.94);
    }

    /* Wind sub-row */
    .wind-sub {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .wind-dir-badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-2);
      letter-spacing: .05em;
    }

    /* ── Forecast panel ─────────────────────────── */
    .forecast-panel { animation-delay: .08s; }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .f-day {
      text-align: center;
      padding: 13px 4px;
      border-radius: var(--r-sm);
      border: 1px solid transparent;
      transition: all .2s;
      cursor: default;
    }
    .f-day:hover { background: rgba(100,255,218,.04); border-color: rgba(100,255,218,.08); }
    .f-day.is-today {
      background: rgba(0,229,255,.06);
      border-color: rgba(0,229,255,.2);
    }

    .f-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      color: var(--text-3);
      margin-bottom: 9px;
    }
    .f-day.is-today .f-label { color: var(--cyan); }

    .f-icon { font-size: 24px; margin-bottom: 9px; line-height: 1; }

    .f-hi {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .f-lo {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }

    /* ── Empty / Error / Loading states ─────────── */
    .state-panel {
      padding: 60px 28px;
      text-align: center;
      animation: fadeUp .35s ease;
    }

    .state-icon  { font-size: 52px; margin-bottom: 18px; opacity: .45; }
    .state-title {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 8px;
      letter-spacing: .06em;
    }
    .state-sub { font-size: 13px; color: var(--text-3); line-height: 1.6; }

    /* Error */
    .error-bar {
      background: rgba(255,107,107,.06);
      border: 1px solid rgba(255,107,107,.2);
      border-radius: var(--r);
      padding: 16px 22px;
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      animation: fadeUp .3s ease;
    }
    .error-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .error-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--red);
      letter-spacing: .12em;
      margin-bottom: 3px;
    }
    .error-msg { font-size: 13px; color: var(--text-2); line-height: 1.5; }

    /* Loading shimmer */
    .shimmer {
      background: rgba(255,255,255,.04);
      border-radius: 6px;
      position: relative;
      overflow: hidden;
    }
    .shimmer::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    /* ── Refresh row ────────────────────────────── */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0 4px;
    }
    .updated-at {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: .08em;
    }
    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 14px;
      color: var(--text-3);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      cursor: pointer;
      transition: all .2s;
    }
    .refresh-btn:hover { border-color: var(--border-h); color: var(--teal); }
    .refresh-btn:disabled { opacity: .4; pointer-events: none; }

    /* ── Footer ─────────────────────────────────── */
    footer {
      text-align: center;
      padding: 20px 0 4px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: .12em;
    }
    footer a { color: var(--text-3); text-decoration: none; }
    footer a:hover { color: var(--text-2); }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 640px) {
      .main-grid { grid-template-columns: 1fr; }
      .forecast-grid { grid-template-columns: repeat(4, 1fr); }
      .search-wrap { max-width: 100%; }
      .header { flex-direction: column; align-items: flex-start; }
      .temp-num { font-size: 60px; }
      .radar-wrap { width: 160px; height: 160px; right: -30px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::after { animation: none !important; transition: none !important; }
      .bar-fill { transition: none !important; }
    }
  </style>
</head>
<body>
<div class="bg"></div>

<div class="container">

  <!-- ── Header ──────────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      ATMOSPHERICS
    </div>
    <div class="search-wrap">
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="Enter city name…"
        autocomplete="off"
        spellcheck="false"
        aria-label="City search"
      />
      <button id="searchBtn" class="search-btn" type="button">SCAN</button>
    </div>
  </header>

  <!-- ── Error container ─────────────────────────── -->
  <div id="errorBox"></div>

  <!-- ── Main content ────────────────────────────── -->
  <div id="mainContent">
    <!-- Populated by JS -->
  </div>

  <!-- ── Meta row ────────────────────────────────── -->
  <div id="metaRow"></div>

  <footer>
    DATA — <a href="https://open-meteo.com/" target="_blank" rel="noopener">OPEN-METEO API</a> — LIVE &amp; FREE
  </footer>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════ */
const GEO_URL     = 'https://geocoding-api.open-meteo.com/v1/search';
const WEATHER_URL = 'https://api.open-meteo.com/v1/forecast';
const REFRESH_MS  = 10 * 60 * 1000; // auto-refresh every 10 min

let currentLocation = null; // { name, country, latitude, longitude }
let refreshTimer    = null;

/* ── WMO weather code → label + emoji ─────────────── */
const WMO = {
   0: { label: 'Clear Sky',                emoji: '☀️'  },
   1: { label: 'Mainly Clear',             emoji: '🌤️' },
   2: { label: 'Partly Cloudy',            emoji: '⛅'  },
   3: { label: 'Overcast',                 emoji: '☁️'  },
  45: { label: 'Foggy',                    emoji: '🌫️' },
  48: { label: 'Rime Fog',                 emoji: '🌫️' },
  51: { label: 'Light Drizzle',            emoji: '🌦️' },
  53: { label: 'Drizzle',                  emoji: '🌦️' },
  55: { label: 'Heavy Drizzle',            emoji: '🌧️' },
  56: { label: 'Light Freezing Drizzle',   emoji: '🌨️' },
  57: { label: 'Freezing Drizzle',         emoji: '🌨️' },
  61: { label: 'Light Rain',               emoji: '🌦️' },
  63: { label: 'Rain',                     emoji: '🌧️' },
  65: { label: 'Heavy Rain',               emoji: '🌧️' },
  66: { label: 'Light Freezing Rain',      emoji: '🌨️' },
  67: { label: 'Freezing Rain',            emoji: '🌨️' },
  71: { label: 'Light Snow',               emoji: '🌨️' },
  73: { label: 'Snow',                     emoji: '❄️'  },
  75: { label: 'Heavy Snow',               emoji: '❄️'  },
  77: { label: 'Snow Grains',              emoji: '🌨️' },
  80: { label: 'Light Showers',            emoji: '🌦️' },
  81: { label: 'Showers',                  emoji: '🌧️' },
  82: { label: 'Heavy Showers',            emoji: '🌧️' },
  85: { label: 'Snow Showers',             emoji: '🌨️' },
  86: { label: 'Heavy Snow Showers',       emoji: '❄️'  },
  95: { label: 'Thunderstorm',             emoji: '⛈️' },
  96: { label: 'Thunderstorm w/ Hail',     emoji: '⛈️' },
  99: { label: 'Thunderstorm w/ Hail',     emoji: '⛈️' },
};

function getWMO(code) {
  return WMO[code] ?? { label: 'Unknown', emoji: '🌡️' };
}

/* ── Utility: cardinal direction ───────────────────── */
function toCardinal(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

/* ── Utility: temperature CSS class ───────────────── */
function tempClass(t) {
  if (t < 0)   return 't-cold';
  if (t < 10)  return 't-cool';
  if (t < 20)  return 't-mild';
  if (t < 30)  return 't-warm';
  return 't-hot';
}

/* ── Utility: format date from YYYY-MM-DD ──────────── */
function fmtDayLabel(dateStr, idx) {
  if (idx === 0) return 'TODAY';
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('en', { weekday: 'short' }).toUpperCase();
}

/* ── Utility: current datetime string ─────────────── */
function nowString(tz) {
  try {
    const opts = {
      weekday: 'short', day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', hour12: false,
      timeZone: tz
    };
    return new Intl.DateTimeFormat('en', opts).format(new Date()).toUpperCase();
  } catch {
    return new Date().toLocaleString('en', { weekday:'short', day:'2-digit', month:'short' }).toUpperCase();
  }
}

/* ── Wind compass SVG ──────────────────────────────── */
function compassSVG(deg) {
  // Arrow points where wind is coming FROM
  return `
    <svg width="42" height="42" viewBox="0 0 60 60" fill="none" aria-hidden="true">
      <circle cx="30" cy="30" r="27" stroke="rgba(100,255,218,.14)" stroke-width="1"/>
      <circle cx="30" cy="30" r="18" stroke="rgba(100,255,218,.06)" stroke-width="1"/>
      <text x="30" y="9"  fill="rgba(100,255,218,.75)" text-anchor="middle" font-size="8" font-family="monospace" font-weight="700">N</text>
      <text x="55" y="34" fill="rgba(100,255,218,.28)" text-anchor="middle" font-size="8" font-family="monospace">E</text>
      <text x="30" y="57" fill="rgba(100,255,218,.28)" text-anchor="middle" font-size="8" font-family="monospace">S</text>
      <text x="6"  y="34" fill="rgba(100,255,218,.28)" text-anchor="middle" font-size="8" font-family="monospace">W</text>
      <g transform="rotate(${deg}, 30, 30)">
        <polygon points="30,11 27,22 33,22" fill="#64ffda"/>
        <line x1="30" y1="24" x2="30" y2="46" stroke="rgba(100,255,218,.35)" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <circle cx="30" cy="30" r="3.5" fill="#64ffda"/>
    </svg>`;
}

/* ═══════════════════════════════════════════════════════
   API CALLS
═══════════════════════════════════════════════════════ */

/* Step 1 — geocode city name → lat/lon */
async function geocodeCity(city) {
  const url = `${GEO_URL}?name=${encodeURIComponent(city.trim())}&count=5&language=en&format=json`;
  const res  = await fetch(url);

  if (!res.ok) {
    throw new Error(`Geocoding failed (HTTP ${res.status}). Check your connection.`);
  }

  const data = await res.json();

  if (!data.results || data.results.length === 0) {
    throw new Error(`City "${city}" not found. Try a different spelling or nearby city.`);
  }

  const r = data.results[0];
  return {
    name:      r.name,
    country:   r.country_code?.toUpperCase() ?? '',
    latitude:  r.latitude,
    longitude: r.longitude,
    timezone:  r.timezone ?? 'UTC',
  };
}

/* Step 2 — fetch live weather */
async function fetchWeather(lat, lon) {
  const params = new URLSearchParams({
    latitude:  lat,
    longitude: lon,
    current: [
      'temperature_2m',
      'relative_humidity_2m',
      'apparent_temperature',
      'precipitation',
      'weather_code',
      'surface_pressure',
      'wind_speed_10m',
      'wind_direction_10m',
    ].join(','),
    daily: 'weather_code,temperature_2m_max,temperature_2m_min',
    timezone:     'auto',
    forecast_days: 7,
  });

  const res = await fetch(`${WEATHER_URL}?${params}`);

  if (!res.ok) {
    throw new Error(`Weather fetch failed (HTTP ${res.status}). Please try again.`);
  }

  const data = await res.json();

  if (!data.current || !data.daily) {
    throw new Error('Unexpected response format from weather API.');
  }

  return data;
}

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */

function renderEmpty() {
  document.getElementById('mainContent').innerHTML = `
    <div class="panel state-panel">
      <div class="state-icon">🌍</div>
      <div class="state-title">NO LOCATION SELECTED</div>
      <div class="state-sub">Search for any city above to see<br>live temperature, humidity, wind, and a 7-day forecast.</div>
    </div>`;
  document.getElementById('metaRow').innerHTML = '';
}

function renderLoading() {
  clearError();
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('mainContent').innerHTML = `
    <div class="main-grid">
      <div class="panel" style="min-height:260px">
        <div class="shimmer" style="height:18px;width:55%;margin-bottom:12px"></div>
        <div class="shimmer" style="height:11px;width:35%;margin-bottom:28px"></div>
        <div class="shimmer" style="height:70px;width:45%;margin-bottom:14px"></div>
        <div class="shimmer" style="height:13px;width:60%"></div>
      </div>
      <div class="panel" style="min-height:260px">
        ${['80%','65%','70%','55%'].map(w => `
          <div style="margin-bottom:20px">
            <div class="shimmer" style="height:9px;width:30%;margin-bottom:8px"></div>
            <div class="shimmer" style="height:16px;width:${w}"></div>
          </div>`).join('')}
      </div>
    </div>
    <div class="panel forecast-panel" style="min-height:120px">
      <div class="shimmer" style="height:9px;width:20%;margin-bottom:22px"></div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px">
        ${Array(7).fill(0).map(() => `
          <div style="text-align:center">
            <div class="shimmer" style="height:10px;width:80%;margin:0 auto 10px"></div>
            <div class="shimmer" style="height:24px;width:50%;margin:0 auto 10px;border-radius:50%"></div>
            <div class="shimmer" style="height:12px;width:60%;margin:0 auto 4px"></div>
            <div class="shimmer" style="height:10px;width:45%;margin:0 auto"></div>
          </div>`).join('')}
      </div>
    </div>`;
  document.getElementById('metaRow').innerHTML = '';
}

function renderError(msg) {
  document.getElementById('searchBtn').disabled = false;
  document.getElementById('errorBox').innerHTML = `
    <div class="error-bar" role="alert">
      <div class="error-icon">⚠</div>
      <div>
        <div class="error-title">FETCH ERROR</div>
        <div class="error-msg">${escHtml(msg)}</div>
      </div>
    </div>`;
}

function clearError() {
  document.getElementById('errorBox').innerHTML = '';
}

function renderWeather(data, loc) {
  const c  = data.current;
  const cu = data.current_units;
  const d  = data.daily;

  const temp     = Math.round(c.temperature_2m);
  const feels    = Math.round(c.apparent_temperature);
  const humidity = c.relative_humidity_2m;
  const wind     = Math.round(c.wind_speed_10m);
  const windDir  = Math.round(c.wind_direction_10m);
  const pressure = Math.round(c.surface_pressure);
  const precip   = c.precipitation.toFixed(1);
  const code     = c.weather_code;
  const wmo      = getWMO(code);
  const cardinal = toCardinal(windDir);
  const tc       = tempClass(temp);
  const dt       = nowString(loc.timezone);

  /* Primary panel */
  const primary = `
    <div class="panel primary-panel">
      <div class="radar-wrap" aria-hidden="true">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      </div>

      <div class="location-row">
        <h1 class="city-name">
          ${escHtml(loc.name)}<span class="country-badge">${escHtml(loc.country)}</span>
        </h1>
        <p class="datetime">${dt}</p>
      </div>

      <div class="temp-row">
        <span class="temp-num ${tc}" id="tempNum">${temp}</span>
        <span class="temp-deg">°C</span>
      </div>

      <div class="condition-row">
        <span class="cond-icon">${wmo.emoji}</span>
        <span class="cond-text">${escHtml(wmo.label)}</span>
      </div>

      <p class="feels-row">Feels like <span>${feels}°C</span></p>
    </div>`;

  /* Metrics panel */
  const metrics = `
    <div class="panel">
      <p class="section-label">CURRENT CONDITIONS</p>

      <div class="metric-item">
        <div class="metric-icon-box">💧</div>
        <div class="metric-body">
          <div class="metric-lbl">HUMIDITY</div>
          <div class="metric-val">${humidity}%</div>
          <div class="bar-track"><div class="bar-fill" id="humBar"></div></div>
        </div>
      </div>

      <div class="metric-item">
        <div class="metric-icon-box">🌬️</div>
        <div class="metric-body">
          <div class="metric-lbl">WIND</div>
          <div class="metric-val">${wind} <span style="font-weight:300;font-size:12px;color:var(--text-2)">${cu.wind_speed_10m}</span></div>
          <div class="wind-sub">
            ${compassSVG(windDir)}
            <span class="wind-dir-badge">FROM ${cardinal} (${windDir}°)</span>
          </div>
        </div>
      </div>

      <div class="metric-item">
        <div class="metric-icon-box" style="font-size:14px;font-family:monospace;color:var(--teal)">hPa</div>
        <div class="metric-body">
          <div class="metric-lbl">PRESSURE</div>
          <div class="metric-val">${pressure} <span style="font-weight:300;font-size:12px;color:var(--text-2)">hPa</span></div>
          <div class="bar-track"><div class="bar-fill" id="presBar"></div></div>
        </div>
      </div>

      <div class="metric-item">
        <div class="metric-icon-box">🌧️</div>
        <div class="metric-body">
          <div class="metric-lbl">PRECIPITATION</div>
          <div class="metric-val">${precip} <span style="font-weight:300;font-size:12px;color:var(--text-2)">${cu.precipitation}</span></div>
        </div>
      </div>
    </div>`;

  /* 7-day forecast */
  const forecastCards = d.time.map((dateStr, i) => {
    const w   = getWMO(d.weather_code[i]);
    const hi  = Math.round(d.temperature_2m_max[i]);
    const lo  = Math.round(d.temperature_2m_min[i]);
    const lbl = fmtDayLabel(dateStr, i);
    return `
      <div class="f-day${i === 0 ? ' is-today' : ''}">
        <div class="f-label">${lbl}</div>
        <div class="f-icon">${w.emoji}</div>
        <div class="f-hi">${hi}°</div>
        <div class="f-lo">${lo}°</div>
      </div>`;
  }).join('');

  const forecast = `
    <div class="panel forecast-panel">
      <p class="section-label">7-DAY FORECAST</p>
      <div class="forecast-grid">${forecastCards}</div>
    </div>`;

  document.getElementById('mainContent').innerHTML =
    `<div class="main-grid">${primary}${metrics}</div>${forecast}`;

  /* Animate bars after paint */
  requestAnimationFrame(() => {
    setTimeout(() => {
      const hb = document.getElementById('humBar');
      if (hb) hb.style.width = `${Math.min(humidity, 100)}%`;

      // Pressure: typical range 960–1040 hPa → normalise
      const pb = document.getElementById('presBar');
      if (pb) pb.style.width = `${Math.round(((pressure - 960) / 80) * 100).toFixed(0)}%`;
    }, 80);
  });

  document.getElementById('searchBtn').disabled = false;
  renderMeta(dt);
}

function renderMeta(dt) {
  document.getElementById('metaRow').innerHTML = `
    <div class="meta-row">
      <span class="updated-at">UPDATED — ${dt}</span>
      <button class="refresh-btn" id="refreshBtn">↺ REFRESH</button>
    </div>`;
  document.getElementById('refreshBtn').addEventListener('click', () => {
    if (currentLocation) loadWeather(currentLocation);
  });
}

/* ── HTML escape helper ────────────────────────────── */
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ═══════════════════════════════════════════════════════
   ORCHESTRATION
═══════════════════════════════════════════════════════ */

async function loadWeather(loc) {
  renderLoading();
  clearError();
  try {
    const data = await fetchWeather(loc.latitude, loc.longitude);
    renderWeather(data, loc);
    scheduleRefresh();
  } catch (err) {
    renderError(getErrorMessage(err));
    // Restore previous content if any, or empty state
    if (!currentLocation) renderEmpty();
    else document.getElementById('mainContent').innerHTML = '';
  }
}

async function handleSearch(cityInput) {
  const city = cityInput.trim();
  if (!city) return;

  renderLoading();
  clearError();

  try {
    const loc  = await geocodeCity(city);
    currentLocation = loc;
    const data = await fetchWeather(loc.latitude, loc.longitude);
    renderWeather(data, loc);
    scheduleRefresh();
  } catch (err) {
    document.getElementById('searchBtn').disabled = false;
    renderError(getErrorMessage(err));
    if (!currentLocation) renderEmpty();
  }
}

function getErrorMessage(err) {
  if (err instanceof TypeError && err.message.toLowerCase().includes('fetch')) {
    return 'Network error — check your internet connection and try again.';
  }
  return err.message || 'An unexpected error occurred.';
}

function scheduleRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    if (currentLocation) loadWeather(currentLocation);
  }, REFRESH_MS);
}

/* ═══════════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════════ */
document.getElementById('searchBtn').addEventListener('click', () => {
  handleSearch(document.getElementById('searchInput').value);
});

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSearch(e.target.value);
});

/* ── On load: default to London ────────────────────── */
(async () => {
  renderLoading();
  try {
    const loc = await geocodeCity('London');
    currentLocation = loc;
    document.getElementById('searchInput').value = 'London';
    const data = await fetchWeather(loc.latitude, loc.longitude);
    renderWeather(data, loc);
    scheduleRefresh();
  } catch (err) {
    renderEmpty();
    renderError(getErrorMessage(err));
  }
})();
</script>
